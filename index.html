<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>관리사무소 납품 견적서</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;font-size:13px;background:#f0f4f8;color:#222}

/* ── 레이아웃 ── */
.wrap{display:flex;gap:10px;padding:10px;max-width:1400px;margin:0 auto}
.left-panel{width:220px;flex-shrink:0}
.right-panel{flex:1;min-width:0}

/* ── 카드 ── */
.card{background:#fff;border-radius:10px;box-shadow:0 1px 6px rgba(0,0,0,.08);margin-bottom:10px;overflow:hidden}
.card-hd{background:linear-gradient(135deg,#1F4E79,#2e6da4);color:#fff;padding:10px 14px;font-weight:700;font-size:13px}
.card-bd{padding:12px}

/* ── 좌측 입력 폼 ── */
.form-row{display:flex;align-items:center;margin-bottom:7px;gap:6px}
.form-row label{width:80px;font-size:12px;color:#555;flex-shrink:0}
.form-row input[type=text],.form-row input[type=number]{
  flex:1;border:1px solid #ddd;border-radius:5px;padding:5px 7px;font-size:13px;width:100%}
.form-row input:focus{outline:none;border-color:#2e6da4}
.section-title{font-size:11px;font-weight:700;color:#1F4E79;margin:8px 0 5px;padding-bottom:3px;border-bottom:1px solid #e0e8f0}
.total-badge{background:#e8f1f9;border-radius:5px;padding:4px 8px;font-size:11px;color:#1F4E79;font-weight:700;text-align:center;margin-top:6px}
.btn-calc{width:100%;padding:10px;background:linear-gradient(135deg,#1F4E79,#2e6da4);color:#fff;border:none;border-radius:7px;font-size:14px;font-weight:700;cursor:pointer;margin-top:8px;letter-spacing:.5px}
.btn-calc:hover{background:linear-gradient(135deg,#163d5e,#24588a)}
.btn-sm{padding:5px 11px;border-radius:5px;border:none;font-size:12px;cursor:pointer;font-weight:600}
.btn-print{background:#1F4E79;color:#fff}
.btn-reset{background:#e0e8f0;color:#333}

/* ── 탭 ── */
.tabs{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px}
.tab{padding:7px 12px;border-radius:6px;background:#e0e8f0;cursor:pointer;font-size:12px;font-weight:600;color:#555;white-space:nowrap}
.tab.active{background:linear-gradient(135deg,#1F4E79,#2e6da4);color:#fff}
.tab-badge{font-size:10px;background:rgba(255,255,255,.25);border-radius:10px;padding:1px 5px;margin-left:4px}
.tab:not(.active) .tab-badge{background:rgba(0,0,0,.08);color:#888}

/* ── 마진율 컨트롤 ── */
.margin-bar{display:flex;align-items:center;gap:8px;padding:8px 10px;background:#f8fafc;border-radius:7px;margin-bottom:8px;flex-wrap:wrap}
.margin-bar label{font-size:12px;color:#555;white-space:nowrap}
.margin-bar input{width:70px;border:1px solid #ddd;border-radius:5px;padding:4px 7px;font-size:13px;font-weight:700;text-align:center}
.margin-bar input:focus{outline:none;border-color:#2e6da4}
.margin-bar .hint{font-size:11px;color:#888}
.margin-bar .btn-apply{padding:4px 10px;background:#2e6da4;color:#fff;border:none;border-radius:5px;font-size:12px;cursor:pointer;font-weight:600}
.margin-bar .btn-apply:hover{background:#1F4E79}

/* ── 테이블 ── */
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:#1F4E79;color:#fff;padding:7px 5px;text-align:center;white-space:nowrap;font-weight:600}
td{padding:5px 5px;border-bottom:1px solid #eef2f7;vertical-align:middle}
tr:hover td{background:#f5f8fc}
.tc{text-align:center}
.tl{text-align:left}
.tr{text-align:right}
.supply-col{color:#888;font-size:11px}

/* 수량/단가 입력 */
.ni{width:62px;border:1px solid #ddd;border-radius:4px;padding:3px 5px;text-align:center;font-size:12px}
.pi{width:95px;border:1px solid #ddd;border-radius:4px;padding:3px 5px;text-align:right;font-size:12px;background:#fff9e6}
.si{width:95px;border:1px solid #e8eef5;border-radius:4px;padding:3px 5px;text-align:right;font-size:12px;background:#e8f4ea;color:#1a6b2a;font-weight:600;cursor:default}
.ni:focus,.pi:focus{outline:none;border-color:#2e6da4}

/* ── 합계 ── */
.total-row{margin-top:8px;display:flex;justify-content:flex-end}
.total-box table{font-size:12px;min-width:240px}
.total-box td{padding:4px 10px}
.tl2{text-align:left;color:#555}
.total-box tr.grand td{font-weight:700;color:#1F4E79;font-size:13px;border-top:2px solid #1F4E79}
.grand-bar{margin-top:12px;padding:11px 16px;background:linear-gradient(135deg,#1F4E79,#2e6da4);color:#fff;border-radius:8px;font-size:14px;font-weight:700;text-align:right}
.note{font-size:11px;color:#888;margin-top:8px;padding:0 4px}

/* ── 툴바 ── */
.toolbar{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;gap:8px;flex-wrap:wrap}
.apt-title{font-size:17px;font-weight:800;color:#1F4E79}
.summary-bar{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.sb{background:#e8f1f9;border-radius:5px;padding:3px 9px;font-size:11px;color:#1F4E79;font-weight:600}

/* ── 빈 상태 ── */
.empty{text-align:center;padding:50px 20px;color:#aaa}
.empty div{font-size:36px;margin-bottom:10px}
.empty p{font-size:13px;line-height:1.6}

/* ── 인쇄 ── */
@media print {
  body{background:#fff}
  .left-panel,.btn-calc,.btn-reset,.btn-print,.margin-bar,.note{display:none!important}
  .wrap{padding:0}
  .right-panel{width:100%}
  .card{box-shadow:none;border:none}
  .card-hd{display:none}
  .supply-col,.pi,.supply-th{display:none!important}
  th.supply-th,td.supply-td{display:none!important}
  table{font-size:10px}
  td,th{padding:4px 4px}
  .si{border:none;background:none;font-size:10px}
  .tabs .tab:not(.active){display:none}
  .tab-pane{display:block!important}
  .grand-bar{background:#1F4E79;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  @page{margin:15mm 10mm}
  /* ── 표지 ── */
  .cover-page{display:block!important;page-break-after:always;text-align:center;padding:80mm 20mm 40mm}
  .cover-title{font-size:32px;font-weight:900;letter-spacing:8px;color:#1F4E79;margin-bottom:20mm}
  .cover-apt{font-size:22px;font-weight:700;margin-bottom:16mm;color:#222}
  .cover-meta{font-size:13px;color:#555;line-height:2.2;border-top:2px solid #1F4E79;border-bottom:1px solid #ccc;display:inline-block;padding:8px 30px}
  .cover-meta td:first-child{font-weight:700;padding-right:16px;color:#1F4E79}
  /* ── 요약표 ── */
  .summary-print{display:block!important;page-break-after:always;padding:10mm 0}
  .summary-print h2{font-size:16px;font-weight:700;color:#1F4E79;margin-bottom:8px;border-bottom:2px solid #1F4E79;padding-bottom:4px}
  .summary-print table{width:100%;border-collapse:collapse;font-size:12px}
  .summary-print th{background:#1F4E79;color:#fff;padding:7px 10px;text-align:center;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .summary-print td{padding:6px 10px;border-bottom:1px solid #ddd}
  .summary-print td:first-child{font-weight:600}
  .summary-print td:not(:first-child){text-align:right}
  .summary-print .grand-row td{background:#e8f1f9;font-weight:700;border-top:2px solid #1F4E79;-webkit-print-color-adjust:exact;print-color-adjust:exact}
}


/* 화면에서 표지·요약표 숨김 */
.cover-page, .summary-print{display:none}
/* ── 반응형 ── */
@media(max-width:700px){
  .wrap{flex-direction:column;padding:8px}
  .left-panel{width:100%}
  table{font-size:11px}
  .ni{width:50px}
  .pi,.si{width:80px}
}
</style>
</head>
<body>
<div class="wrap">

<!-- ── 좌측 입력 패널 ── -->
<div class="left-panel">
  <div class="card">
    <div class="card-hd">📋 기본 정보</div>
    <div class="card-bd">
      <div class="form-row">
        <label>아파트명</label>
        <input type="text" id="aptName" placeholder="예) 힐스테이트" value="">
      </div>
      <div class="form-row">
        <label>세대수</label>
        <input type="number" id="세대수" value="600" min="0">
      </div>
      <div class="form-row">
        <label>지역</label>
        <input type="text" id="지역" placeholder="예) 서울">
      </div>

      <div class="section-title">👔 관리소 직원</div>
      <div class="form-row"><label>소장</label><input type="number" id="소장" value="1" min="0" oninput="updateTotal()"></div>
      <div class="form-row"><label>경리대리</label><input type="number" id="경리대리" value="1" min="0" oninput="updateTotal()"></div>
      <div class="form-row"><label>관리과장</label><input type="number" id="관리과장" value="1" min="0" oninput="updateTotal()"></div>
      <div class="form-row"><label>서무주임</label><input type="number" id="서무주임" value="1" min="0" oninput="updateTotal()"></div>
      <div class="form-row"><label>기전주임</label><input type="number" id="기전주임" value="1" min="0" oninput="updateTotal()"></div>
      <div class="form-row"><label>기전주야</label><input type="number" id="기전주야" value="4" min="0" oninput="updateTotal()"></div>

      <div class="section-title">🧹 미화원</div>
      <div class="form-row"><label>미화원</label><input type="number" id="미화원" value="8" min="0" oninput="updateTotal()"></div>
      <div class="form-row"><label>외곽미화원</label><input type="number" id="외곽미화" value="2" min="0" oninput="updateTotal()"></div>

      <div class="section-title">🛡 경비</div>
      <div class="form-row"><label>경비</label><input type="number" id="경비" value="5" min="0" oninput="updateTotal()"></div>

      <div class="total-badge" id="totalBadge">총원: — 명</div>

      <button class="btn-calc" onclick="calculate()">📊 수량 자동 계산</button>
    </div>
  </div>
</div>

<!-- ── 우측 견적 ── -->
<div class="right-panel">
  <div class="card">
    <div class="card-hd">📄 견적서</div>
    <div class="card-bd">
      <div id="quoteArea">
        <div class="empty"><div>📊</div><p>왼쪽에서 인원을 입력하고<br><b>수량 자동 계산</b>을 눌러주세요</p></div>
      </div>
    </div>
  </div>
</div>

</div><!-- /wrap -->

<script>
// ── 숫자 포맷 ──
const fmt = n => n > 0 ? Number(n).toLocaleString('ko-KR')+'원' : '-';

// ── 10원 단위 올림 ──
const ceil10 = n => Math.ceil(n / 10) * 10;

// ── 마진 적용 판매가 ──
function sellPrice(supply, marginPct) {
  if (!supply || supply <= 0) return 0;
  return ceil10(supply * (1 + marginPct / 100));
}

// ── 세대수 비례 헬퍼 ──
const sd = (base, s, min) => Math.max(min !== undefined ? min : Math.ceil(base * 0.5), Math.round(base * Math.max(0.3, s.세대수 / 600)));

// ── 총원 자동계산 ──
function updateTotal() {
  const ids = ['소장','경리대리','관리과장','서무주임','기전주임','기전주야','미화원','외곽미화','경비'];
  const total = ids.reduce((s, id) => s + (parseInt(document.getElementById(id)?.value) || 0), 0);
  document.getElementById('totalBadge').textContent = `총원: ${total}명`;
}
updateTotal();

// ── 마진율 저장 (탭별) ──

// ── 판매가 계산 및 테이블 갱신 ──
function recalcSellPrices(cat) {
  const margin = parseFloat(document.getElementById(`margin_${cat}`)?.value) || 0;
  DATA[cat].forEach((f, i) => {
    const supEl = document.getElementById(`sup_${cat}_${i}`);
    const selEl = document.getElementById(`sel_${cat}_${i}`);
    const qtyEl = document.getElementById(`qty_${cat}_${i}`);
    const amtEl = document.getElementById(`amt_${cat}_${i}`);
    if (!supEl || !selEl) return;
    const supply = parseInt(supEl.value.replace(/[^0-9]/g,'')) || 0;
    const sp = sellPrice(supply, margin);
    selEl.value = sp > 0 ? sp.toLocaleString('ko-KR') : '';
    const qty = parseInt(qtyEl?.value) || 0;
    const amt = qty * sp;
    if (amtEl) amtEl.textContent = amt > 0 ? fmt(amt) : (cat==='가구'&&f.no===22?'별도산정':'-');
  });
  recalcSub(cat);
}


// ── 인쇄용 요약 업데이트 ──
function updateSummary() {
  const catMap = {가구:'사무용가구', 집기:'사무집기', 용품:'사무용품', 공기구:'공기구', 미화:'미화용품'};
  const el = id => document.getElementById(id);
  let grandSub = 0, grandVat = 0;
  Object.entries(catMap).forEach(([key]) => {
    let sub = 0;
    if (DATA[key]) {
      DATA[key].forEach((f, i) => {
        const qty = parseInt(el(`qty_${key}_${i}`)?.value) || 0;
        const selEl = el(`sel_${key}_${i}`);
        const sp = selEl ? parseInt(selEl.value.replace(/[^0-9]/g,'')) || 0 : 0;
        sub += qty * sp;
      });
    }
    const vat = Math.round(sub * 0.1);
    grandSub += sub;
    grandVat += vat;
    if (el(`psum-sub-${key}`)) el(`psum-sub-${key}`).textContent = sub > 0 ? sub.toLocaleString('ko-KR')+'원' : '-';
    if (el(`psum-vat-${key}`)) el(`psum-vat-${key}`).textContent = vat > 0 ? vat.toLocaleString('ko-KR')+'원' : '-';
    if (el(`psum-tot-${key}`)) el(`psum-tot-${key}`).textContent = (sub+vat) > 0 ? (sub+vat).toLocaleString('ko-KR')+'원' : '-';
  });
  const grandTot = grandSub + grandVat;
  if (el('psum-grand-sub')) el('psum-grand-sub').textContent = grandSub > 0 ? grandSub.toLocaleString('ko-KR')+'원' : '-';
  if (el('psum-grand-vat')) el('psum-grand-vat').textContent = grandVat > 0 ? grandVat.toLocaleString('ko-KR')+'원' : '-';
  if (el('psum-grand-tot')) el('psum-grand-tot').textContent = grandTot > 0 ? grandTot.toLocaleString('ko-KR')+'원' : '-';
}

function recalcSub(cat) {
  let sub = 0;
  DATA[cat].forEach((f, i) => {
    const qty = parseInt(document.getElementById(`qty_${cat}_${i}`)?.value) || 0;
    const selEl = document.getElementById(`sel_${cat}_${i}`);
    const sp = selEl ? parseInt(selEl.value.replace(/[^0-9]/g,'')) || 0 : 0;
    sub += qty * sp;
  });
  const vat = Math.round(sub * 0.1);
  const el = id => document.getElementById(id);
  if (el(`sub_${cat}`)) el(`sub_${cat}`).textContent = fmt(sub);
  if (el(`vat_${cat}`)) el(`vat_${cat}`).textContent = fmt(vat);
  if (el(`tot_${cat}`)) el(`tot_${cat}`).textContent = fmt(sub + vat);

  // grand total
  let grand = 0;
  Object.keys(DATA).forEach(c => {
    DATA[c].forEach((f, i) => {
      const qty = parseInt(document.getElementById(`qty_${c}_${i}`)?.value) || 0;
      const selEl = document.getElementById(`sel_${c}_${i}`);
      const sp = selEl ? parseInt(selEl.value.replace(/[^0-9]/g,'')) || 0 : 0;
      grand += qty * sp;
    });
  });
  const grandEl = document.getElementById('grand_total');
  if (grandEl) grandEl.textContent = `전체 합계 (VAT포함): ${Math.round(grand * 1.1).toLocaleString('ko-KR')}원`;
  updateSummary();
}

// ── 테이블 HTML 생성 ──
function makeTable(cat, items, s, margin) {
  let rows = '';
  items.forEach((f, i) => {
    const qty = f.scale(s);
    const supply = f.price;
    const sp = sellPrice(supply, margin);
    const amt = qty * sp;
    const brand = f.brand ? `<span style="font-size:10px;color:#888">${f.brand}</span><br>` : '';
    const code  = f.code  ? `<span style="font-size:9px;color:#bbb">${f.code}</span>` : '';
    const srcBadge = f.src === 'naver'
      ? `<span style="font-size:9px;background:#fff3e0;color:#e65100;border:1px solid #ffb74d;border-radius:3px;padding:0 3px;margin-left:3px">네이버</span>`
      : f.src === 'hanyang'
      ? `<span style="font-size:9px;background:#e8f5e9;color:#2e7d32;border:1px solid #81c784;border-radius:3px;padding:0 3px;margin-left:3px">한양유통</span>`
      : (f.code ? `<span style="font-size:9px;background:#e3f2fd;color:#1565c0;border:1px solid #90caf9;border-radius:3px;padding:0 3px;margin-left:3px">크레텍</span>` : '');
    const spec  = typeof f.spec === 'function' ? f.spec(s) : f.spec;
    rows += `<tr>
      <td class="tc" style="color:#999;font-size:11px">${f.no}</td>
      <td class="tl" style="min-width:90px">${brand}${f.name}${srcBadge}</td>
      <td class="tc" style="font-size:10px;color:#777;min-width:90px">${spec}${code?'<br>'+code:''}</td>
      <td class="tc">
        <input type="number" class="ni" id="qty_${cat}_${i}" value="${qty}" min="0"
          oninput="recalcSub('${cat}')"/>
      </td>
      <td class="tr supply-td">
        <input type="text" class="pi" id="sup_${cat}_${i}"
          value="${supply > 0 ? supply.toLocaleString('ko-KR') : ''}"
          placeholder="공급단가"
          inputmode="numeric"
          oninput="this.value=this.value.replace(/[^0-9,]/g,'');recalcSellPrices('${cat}')"/>
      </td>
      <td class="tr">
        <input type="text" class="si" id="sel_${cat}_${i}"
          value="${sp > 0 ? sp.toLocaleString('ko-KR') : ''}"
          placeholder="판매가"
          inputmode="numeric"
          oninput="this.value=this.value.replace(/[^0-9,]/g,'');recalcSub('${cat}')"/>
      </td>
      <td class="tr" id="amt_${cat}_${i}">${amt>0?fmt(amt):(cat==='가구'&&f.no===22?'별도산정':'-')}</td>
    </tr>`;
  });
  return `
  <div class="margin-bar">
    <label>마진율</label>
    <input type="number" id="margin_${cat}" value="${margin}" min="0" max="100" step="0.5"
      oninput="margins['${cat}']=parseFloat(this.value)||0;recalcSellPrices('${cat}')"/>
    <span class="hint">%</span>
    <button class="btn-apply" onclick="recalcSellPrices('${cat}')">판매가 재계산</button>
    <span class="hint">※ 판매가 = 공급단가 × (1 + 마진율%) → 10원 올림</span>
  </div>
  <div class="tbl-wrap">
  <table>
    <thead><tr>
      <th style="width:32px">NO</th>
      <th style="text-align:left">품목명</th>
      <th class="spec-th" style="min-width:80px">규격/모델명</th>
      <th style="width:60px">수량</th>
      <th class="supply-th" style="width:100px">공급단가(원)</th>
      <th style="width:100px">판매가(원)</th>
      <th style="width:100px">금액(원)</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>
  </div>
  <div class="total-row">
    <div class="total-box">
      <table>
        <tr><td class="tl2">소&nbsp;&nbsp;&nbsp;계</td><td class="tr" id="sub_${cat}">-</td></tr>
        <tr><td class="tl2">부가세 (10%)</td><td class="tr" id="vat_${cat}">-</td></tr>
        <tr class="grand"><td class="tl2">합&nbsp;&nbsp;&nbsp;계</td><td class="tr" id="tot_${cat}">-</td></tr>
      </table>
    </div>
  </div>`;
}

// ── 탭 전환 ──
let activeTab = '가구';
function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.querySelectorAll('.tab-pane').forEach(p => p.style.display = p.dataset.pane === tab ? '' : 'none');
}

// ── 메인 계산 ──
function calculate() {

  const 기전주야 = parseInt(document.getElementById('기전주야').value) || 0;

    사무직: 소장 + 경리대리 + 관리과장 + 서무주임,
    기전:   기전주임 + 기전주야,
    미화:   미화원 + 외곽미화,
    세대수,
    총원: 소장+경리대리+관리과장+서무주임+기전주임+기전주야+경비+미화원+외곽미화
  };

  const today = new Date().toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric'});

  let tabsHtml = '<div class="tabs">';

    panesHtml += `<div class="tab-pane" data-pane="${key}" style="display:${idx===0?'':'none'}">${makeTable(key, DATA[key], s, m)}</div>`;
  });

  document.getElementById('quoteArea').innerHTML = `
    <div class="cover-page">
      <div style="height:30mm"></div>
      <div class="cover-title">납 품 견 적 서</div>
      <div class="cover-apt">${aptName}</div>
      <div style="margin-top:10mm">
